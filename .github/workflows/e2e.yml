name: E2E Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Checkout backend repo
        uses: actions/checkout@v4
        with:
          repository: cpflaume/provisioncalculator:main
          path: provisioncalculator
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Get latest backend tag
        id: be-tag
        run: |
          cd provisioncalculator
          TAG=$(git tag --sort=-v:refname | head -1)
          if [ -z "$TAG" ]; then
            echo "::error::No tags found in backend repo"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using backend tag: $TAG"
          git checkout "$TAG"

      - name: Build backend JAR
        run: |
          cd provisioncalculator
          gradle bootJar -x test
        env:
          JAVA_TOOL_OPTIONS: ''

      - name: Copy backend JAR
        run: |
          mkdir -p e2e/.backend
          cp provisioncalculator/build/libs/*.jar e2e/.backend/provisioncalculator.jar

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          VITE_API_BASE_URL: 'http://localhost:5173'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 14
