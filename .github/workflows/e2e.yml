name: E2E Tests

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      record_videos:
        description: 'Record videos for all tests (not just failures)'
        type: boolean
        default: false

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare backend JAR
        run: |
          mkdir -p e2e/.backend
          BRANCH="${{ github.head_ref || github.ref_name }}"
          BACKEND_REPO="https://x-access-token:${GH_PAT}@github.com/cpflaume/provisioncalculator.git"

          # If a matching branch exists in the backend repo, build from source
          if git ls-remote --exit-code "$BACKEND_REPO" "refs/heads/$BRANCH" > /dev/null 2>&1; then
            echo "Found backend branch '$BRANCH' — building from source"
            git clone --depth=1 --branch "$BRANCH" "$BACKEND_REPO" backend-src
            cd backend-src
            gradle bootJar -x test
            cp build/libs/*.jar ../e2e/.backend/provisioncalculator.jar
            cd ..
          else
            echo "No matching backend branch — downloading latest release JAR"
            ASSET_URL=$(curl -s \
              -H "Authorization: token $GH_PAT" \
              https://api.github.com/repos/cpflaume/provisioncalculator/releases/latest \
              | jq -r '.assets[] | select(.name | endswith(".jar")) | .url')
            if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
              echo "::error::No JAR asset found in latest backend release"
              exit 1
            fi
            curl -L -o e2e/.backend/provisioncalculator.jar \
              -H "Authorization: token $GH_PAT" \
              -H "Accept: application/octet-stream" \
              "$ASSET_URL"
          fi
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Verify backend JAR
        run: |
          ls -la e2e/.backend/
          file e2e/.backend/provisioncalculator.jar

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          VITE_API_BASE_URL: 'http://localhost:5173'
          RECORD_ALL_VIDEOS: ${{ inputs.record_videos == true && 'true' || 'false' }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 14
