name: E2E Tests

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      record_videos:
        description: 'Record videos for all tests (not just failures)'
        type: boolean
        default: false

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Prepare backend JAR
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p e2e/.backend
          BRANCH="${{ github.head_ref || github.ref_name }}"
          echo "::notice::Frontend branch: $BRANCH"

          # URL-encode the branch name (handles claude/ prefix and slashes)
          ENCODED_BRANCH=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$BRANCH")

          # Use GitHub API to check if a matching branch exists in the backend repo
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/cpflaume/provisioncalculator/branches/${ENCODED_BRANCH}")
          echo "::notice::Backend branch check HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "::notice::Matching backend branch '$BRANCH' found — building JAR from source"

            git clone --depth=1 --branch "$BRANCH" \
              "https://x-access-token:${GH_PAT}@github.com/cpflaume/provisioncalculator.git" \
              backend-src

            # Install Gradle directly (backend has no gradlew wrapper)
            GRADLE_VERSION=8.14.3
            curl -sL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
              -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /opt/gradle-install
            export PATH="/opt/gradle-install/gradle-${GRADLE_VERSION}/bin:$PATH"

            cd backend-src
            gradle bootJar -x test --no-daemon
            cd ..
            cp backend-src/build/libs/*.jar e2e/.backend/provisioncalculator.jar
            echo "::notice::Backend JAR built from source successfully"
          else
            echo "::notice::No matching backend branch (HTTP $HTTP_STATUS) — downloading latest release JAR"
            ASSET_URL=$(curl -s \
              -H "Authorization: token $GH_PAT" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/cpflaume/provisioncalculator/releases/latest \
              | jq -r '.assets[] | select(.name | endswith(".jar")) | .url')
            if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
              echo "::error::No JAR asset found in latest backend release"
              exit 1
            fi
            curl -L -o e2e/.backend/provisioncalculator.jar \
              -H "Authorization: token $GH_PAT" \
              -H "Accept: application/octet-stream" \
              "$ASSET_URL"
            echo "::notice::Downloaded latest release JAR"
          fi
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Verify backend JAR
        run: |
          ls -la e2e/.backend/
          file e2e/.backend/provisioncalculator.jar

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          VITE_API_BASE_URL: 'http://localhost:5173'
          RECORD_ALL_VIDEOS: ${{ inputs.record_videos == true && 'true' || 'false' }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 14
