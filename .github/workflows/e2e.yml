name: E2E Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'plan-*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'plan-*.md'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Checkout backend repo
        uses: actions/checkout@v4
        with:
          repository: cpflaume/provisioncalculator
          path: provisioncalculator

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Get latest backend tag
        id: be-tag
        run: |
          cd provisioncalculator
          TAG=$(git tag --sort=-v:refname | head -1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using backend tag: $TAG"
          git checkout "$TAG"

      - name: Build backend JAR
        run: |
          cd provisioncalculator
          gradle bootJar -x test
        env:
          JAVA_TOOL_OPTIONS: ''

      - name: Copy backend JAR
        run: |
          mkdir -p e2e/.backend
          cp provisioncalculator/build/libs/*.jar e2e/.backend/provisioncalculator.jar

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          VITE_API_BASE_URL: 'http://localhost:5173'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 30
